name: Validate

on:
  push:
  pull_request:

jobs:
  python-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile integration and client
        run: |
          python -m py_compile \
            custom_components/movemove/*.py \
            scripts/movemove_api_client.py \
            scripts/test_movemove_api_client.py
